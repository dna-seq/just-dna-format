[tool.uv.workspace]
members = ["schema", "compiler"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
testpaths = ["schema/tests", "compiler/tests"]
addopts = "-vvv --import-mode=importlib"
markers = [
    "integration: needs external data/network (an Ensembl reference cache or HuggingFace). Set JUST_DNA_ENSEMBL_CACHE to run resolver tests; skipped otherwise.",
]
